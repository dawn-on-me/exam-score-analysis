<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>物理月考成绩查询与深度诊断</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; font-family: sans-serif; margin: 0; }
        .login-box { background: white; padding: 40px 50px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; }
        input { padding: 12px; width: 220px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 20px; font-size: 16px; outline: none; transition: all 0.3s ease; }
        input:focus { border-color: #2b6cb0; box-shadow: 0 0 8px rgba(43,108,176,0.2); }
        button { padding: 12px 24px; background-color: #2b6cb0; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.3s; font-weight: bold; }
        button:hover { background-color: #1a4971; }
        
        /* 署名专属样式 */
        .signature { 
            margin-top: 35px; 
            font-size: 12px; 
            color: #a0aec0; 
            border-top: 1px dashed #e2e8f0; 
            padding-top: 15px; 
            letter-spacing: 0.5px;
        }
        .signature strong { color: #718096; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #2d3748; margin-top: 0;">物理试卷深度诊断系统</h2>
        <p style="color: #718096; font-size: 14px; margin-bottom: 25px;">请输入你的考号获取专属面批报告</p>
        
        <input type="text" id="studentId" placeholder="" onkeypress="if(event.keyCode==13) checkReport()">
        <br>
        <button onclick="checkReport()">一键获取分析</button>
        
        <!-- 章老师的专属署名区 -->
        <div class="signature">
            © 2026 Designed & Computed by <strong>章老师</strong>
        </div>
    </div>

    <script>
        function checkReport() {
            const id = document.getElementById('studentId').value.trim();
            if(id) {
                // 直接跳转到对应的 HTML 页面
                window.location.href = id + '.html';
            } else {
                alert('考号不能为空！别想偷懒，查自己的卷子！');
            }
        }
    </script>
</body>
</html>
